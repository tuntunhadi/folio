{% extends "wiki/base.html" %}

{% block title %}Delete "{{ page.title }}" — Folio{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-6 py-20">
  <div class="bg-white border border-stone-200 rounded-2xl p-8 shadow-sm text-center">

    <!-- Icon -->
    <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>

    <h1 class="text-xl font-semibold text-stone-900 mb-2" style="font-family: 'Lora', serif;">
      Delete this page?
    </h1>
    <p class="text-stone-500 text-sm mb-1">
      You're about to delete
    </p>
    <p class="text-stone-800 font-semibold text-base mb-6">
      "{{ page.title }}"
    </p>
    <p class="text-red-500 text-xs bg-red-50 border border-red-100 rounded-lg px-4 py-2.5 mb-8">
      This action cannot be undone. The page will be permanently removed.
    </p>

    <div class="flex items-center justify-center gap-3">
      <a href="{% url 'admin_dashboard' %}"
         class="px-5 py-2.5 text-sm font-medium text-stone-600 bg-stone-100
                hover:bg-stone-200 rounded-lg transition">
        Cancel
      </a>
      <form method="post">
        {% csrf_token %}
        <button type="submit"
          class="px-5 py-2.5 text-sm font-medium text-white bg-red-600
                 hover:bg-red-700 active:bg-red-800 rounded-lg transition">
          Delete permanently
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
